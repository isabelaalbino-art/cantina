<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela do Administrador</title>
    <link rel="stylesheet" href="css/style2.css">
    
</head>

<body>


    <!-- HEADER -->
    <header>
        <img src="img/logo cantina.png" class="logo">
        <button id="botao">Voltar para o site</button>
    </header>
    
    <img src="img/design 2.png" class="design2">
    
    <div class="titulo">
        <h1>Silvia Fest</h1>
        <p>Digite a senha para acessar o painel de controle.</p>
        
        
        <form>
            <div class="login">
                
                <p>Login:</p>
                <div class="inputBg">
                    <img src="img/homem.png">
                    <input type="text" placeholder="admin@admin.com">
                </div>
            </div>
            
            <div class="senha">
                <p>Senha:</p>
                <div class="inputBg">
                    <img src="img/cadado.png">
                    <input type="password" placeholder="*********">
                </div>
            </div>
            
            <button class="btnEntrar" type="submit">Entrar
            </button>
            
        </form>
        
    </div>
    <img src="img/design 1.png" class="design">

    <script src="js/script.js"></script>
</body>

</html>
